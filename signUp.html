<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap');
</style>
    <title>Sign Up</title>
</head>
<body>
    <div class="formBox">
    <div class="form">
            <form action="">
                <h3>Get started on Facebook</h3>
                <p>Create an account to connect with friends, family and <br>communities of people who share your interests.</p>
                <label for="">Name</label><br>
                <div class="names">
                    <input type="text" placeholder="First Name">
                <input type="text" placeholder="Surname">
                </div>
                <br>
                <label for="">Date Of Birth</label><br>
                <input type="date"><br>
                <p>Gender</p>
                <input type="radio">
                <label for="">Male</label><br>
                <input type="radio">
                <label for="">Female</label><br>
                <label for="">Mobile number or email address</label><br>
                <input type="text" placeholder="Email dress or mobile number"><br>
                <label for="">Password</label><br>
                <input type="password" placeholder="Password"><br>
                <button class="login">Submit</button><br>
                <button class="newAccount"><a href="./signIn.html">I already have an account</a></button>
            </form>
        </div>
        </div>
</body>
</html>
